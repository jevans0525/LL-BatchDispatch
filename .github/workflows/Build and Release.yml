name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with v (e.g., v1.0, v2.1.3)

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --clean --onefile --windowed --name BatchDispatch --add-data "resources/templates;resources/templates" app.py
    
    - name: Compile Inno Setup
      run: |
          iscc release_config.iss
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: Output/BatchDispatch_Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
        

    
